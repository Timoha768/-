<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9 кнопок с переходом</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        
        h1 {
            margin-bottom: 30px;
            color: #333;
        }
        
        .button-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 300px;
        }
        
        button {
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>9 кнопок с переходом</h1>
    
    <div class="button-container">
        <button onclick="redirectToPage1()">1-4</button>
        <button onclick="redirectToPage5()">5</button>
        <button onclick="redirectToPage6()">6</button>
        <button onclick="redirectToPage7()">7</button>
        <button onclick="redirectToPage8()">8</button>
        <button onclick="redirectToPage9()">9</button>
        <button onclick="redirectToPage10()">10-11-12</button>
        <button onclick="redirectToPage13()">13-14</button>
        <button onclick="redirectToPage()">Кнопка GH</button>
    </div>
    
    <script>
        function redirectToPage1() {
            window.location.href = '1-3/1-3.html';
        }

        function redirectToPage5() {
            window.location.href = 'ЛР 5/LR5.html';
        }

        function redirectToPage6() {
            window.location.href = 'ЛР 6/лр5.html';
        }

        function redirectToPage7() {
            window.location.href = 'ЛР 7/лр65.html';
        }

        function redirectToPage8() {    
            window.location.href = '8/2.html';
        }

        function redirectToPage9() {
            window.location.href = '9/1.html';
        }

        function redirectToPage10() {
            window.location.href = '10-11-12/zad5.html';
        }


        function redirectToPage13() {
            window.location.href = 'ЛР 15/1.html';
        }


         function redirectToPage() {
            window.location.href = 'https://github.com/Timoha768';
        }

    </script>
</body>
</html>
