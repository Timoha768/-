<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акция - Xiaomi 12 Lite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .promo-banner {
            display: flex;
            justify-content: space-around;
            background-color: #ff6900;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .promo-option {
            text-align: center;
        }
        .product-card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .brand {
            font-size: 20px;
            color: #ff6900;
            margin-bottom: 10px;
        }
        .price {
            font-size: 28px;
            font-weight: bold;
            color: #ff0000;
            margin: 15px 0;
        }
        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 18px;
        }
        .bonus {
            color: #ff6900;
            font-weight: bold;
            margin: 10px 0;
        }
        .disclaimer {
            font-size: 12px;
            color: #666;
            font-style: italic;
        }
        .timer {
            background-color: #ff6900;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="promo-banner">
        <div class="promo-option">Промокод</div>
        <div class="promo-option">КРЕДИТ<br>до 36 мес</div>
        <div class="promo-option">Халба<br>до 8 мес</div>
        <div class="promo-option">РАССРОЧКА<br>до 12 мес</div>
    </div>

    <div class="product-card">
        <div class="brand">Xiaomi</div>
        <div class="product-title">Смартфон Xiaomi 12 Lite (6/128 Черный)</div>
        
        <div>Акция:</div>
        <div class="price">1279.00 <span class="old-price">+378.98</span></div>
        
        <div class="bonus">Вернём до 47.09 на бонусную карту</div>
        <div class="disclaimer">*тип рассрочки при которой скидка не действует</div>
        
        <div class="timer">до конца акции осталось 02:04:21</div>
    </div>
</body>
</html>
